version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pembukuan_pribadi_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: pembukuan_pribadi_app
    restart: always
    ports:
      - "${PORT}:${PORT}"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PORT: ${PORT}
    depends_on:
      - db

volumes:
  postgres_data:
